<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tem na Feira – Feiras Livres de SP</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #1e6b35;
    --verde-claro: #2d8c47;
    --verde-escuro: #154d26;
    --verde-bg: #edf7f0;
    --amarelo: #f5c831;
    --amarelo-claro: #fff8dc;
    --laranja: #e8722a;
    --laranja-claro: #fff3ec;
    --creme: #faf7f2;
    --branco: #ffffff;
    --cinza-escuro: #1c1c1c;
    --cinza-medio: #5a5a5a;
    --cinza-claro: #e8e4dc;
    --whatsapp: #25D366;
    --whatsapp-dark: #128C7E;
    --sombra: rgba(30,107,53,0.13);
    --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Nunito Sans',sans-serif; background:var(--creme); color:var(--cinza-escuro); min-height:100vh; }

  /* ── HEADER ── */
  header {
    background:#fff;
    padding:0 20px;
    position:sticky; top:0; z-index:100;
    box-shadow:0 2px 12px rgba(0,0,0,0.08);
    border-bottom:3px solid var(--amarelo);
  }
  .header-inner {
    max-width:960px; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 0;
  }
  .logo { cursor:pointer; display:flex; align-items:center; }
  .logo img { height:48px; width:auto; }
  .badge {
    background:var(--laranja); color:#fff;
    font-family:'Nunito',sans-serif; font-size:12px; font-weight:800;
    padding:5px 14px; border-radius:20px; letter-spacing:.02em;
  }

  /* ── HERO ── */
  .hero {
    background:var(--verde);
    padding:0 20px 0;
    position:relative; overflow:hidden;
  }
  .hero-dots {
    position:absolute; right:-60px; top:-60px;
    width:340px; height:340px; opacity:.18;
    background-image: radial-gradient(circle, var(--amarelo) 3px, transparent 3px);
    background-size: 22px 22px;
    border-radius:50%;
  }
  .hero-inner {
    max-width:960px; margin:0 auto;
    display:flex; align-items:flex-end; justify-content:space-between;
    padding-top:28px;
  }
  .hero-text { padding-bottom:32px; flex:1; }
  .hero-eyebrow {
    display:inline-block;
    background:var(--amarelo); color:var(--verde-escuro);
    font-family:'Nunito',sans-serif; font-size:11px; font-weight:900;
    padding:4px 12px; border-radius:20px; text-transform:uppercase; letter-spacing:.08em;
    margin-bottom:12px;
  }
  .hero-title {
    font-family:'Nunito',sans-serif; font-size:clamp(26px,4vw,40px);
    font-weight:900; color:#fff; line-height:1.1; margin-bottom:8px;
  }
  .hero-title span { color:var(--amarelo); }
  .hero-sub { font-size:14px; color:rgba(255,255,255,.75); font-weight:400; line-height:1.5; }
  .hero-mascot { width:160px; flex-shrink:0; align-self:flex-end; position:relative; bottom:0; }
  .hero-mascot img { width:100%; display:block; }

  /* ── SEARCH CARD ── */
  .search-wrapper { max-width:960px; margin:-1px auto 0; padding:0 20px; position:relative; z-index:10; }
  .search-card {
    background:#fff; border-radius:0 0 var(--radius) var(--radius);
    padding:24px 24px 20px;
    box-shadow:0 8px 32px var(--sombra);
    border:1px solid var(--cinza-claro); border-top:none;
  }
  .search-label { font-family:'Nunito',sans-serif; font-size:13px; font-weight:800; color:var(--cinza-escuro); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
  .search-row { display:flex; gap:10px; margin-bottom:16px; }
  .search-input-wrap { flex:1; position:relative; }
  .search-input {
    width:100%; padding:11px 16px 11px 42px;
    border:2px solid var(--cinza-claro); border-radius:12px;
    font-family:'Nunito Sans',sans-serif; font-size:14px; color:var(--cinza-escuro);
    background:var(--creme); transition:border-color .2s,box-shadow .2s;
  }
  .search-input:focus { outline:none; border-color:var(--verde-claro); box-shadow:0 0 0 3px rgba(45,140,71,.1); }
  .search-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:17px; pointer-events:none; }

  /* DIA BUTTONS */
  .dia-label { font-family:'Nunito',sans-serif; font-size:13px; font-weight:800; color:var(--cinza-escuro); margin-bottom:8px; }
  .dia-btns { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .dia-btn {
    padding:8px 16px; border-radius:10px;
    border:2px solid var(--cinza-claro); background:#fff;
    font-family:'Nunito',sans-serif; font-size:13px; font-weight:700;
    color:var(--cinza-medio); cursor:pointer; transition:all .18s;
  }
  .dia-btn:hover { border-color:var(--verde-claro); color:var(--verde); }
  .dia-btn.active { background:var(--verde); border-color:var(--verde); color:#fff; }
  .dia-btn.hoje { background:var(--laranja); border-color:var(--laranja); color:#fff; }
  .dia-btn.amanha { background:var(--amarelo); border-color:var(--amarelo); color:var(--verde-escuro); }

  /* FILTROS EXTRAS */
  .filtros-extras { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
  .filtro-group { display:flex; flex-direction:column; gap:5px; }
  .filtro-label { font-size:11px; font-weight:700; color:var(--cinza-medio); text-transform:uppercase; letter-spacing:.06em; }
  .filtro-select {
    padding:9px 32px 9px 12px; border:2px solid var(--cinza-claro); border-radius:10px;
    font-family:'Nunito Sans',sans-serif; font-size:13px; color:var(--cinza-escuro);
    background:var(--creme); appearance:none; -webkit-appearance:none; cursor:pointer;
    transition:border-color .2s;
  }
  .filtro-select:focus { outline:none; border-color:var(--verde-claro); }
  .select-wrap { position:relative; }
  .select-wrap::after { content:'▾'; position:absolute; right:10px; top:50%; transform:translateY(-50%); color:var(--verde); pointer-events:none; font-size:13px; }

  .btn-ver-feiras {
    width:100%; padding:14px;
    background:var(--laranja); color:#fff; border:none; border-radius:12px;
    font-family:'Nunito',sans-serif; font-size:16px; font-weight:800;
    cursor:pointer; transition:background .2s, transform .15s;
    display:flex; align-items:center; justify-content:center; gap:8px;
    letter-spacing:.01em;
  }
  .btn-ver-feiras:hover { background:#d4621e; transform:translateY(-1px); }

  /* TAGS ATIVOS */
  .tags-ativos { display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; }
  .tag-ativo {
    background:var(--verde-bg); color:var(--verde);
    border:1px solid rgba(30,107,53,.25); padding:4px 10px;
    border-radius:20px; font-size:11px; font-weight:700;
    display:flex; align-items:center; gap:5px;
  }
  .tag-ativo button { background:none; border:none; cursor:pointer; color:var(--verde); font-size:13px; line-height:1; padding:0; opacity:.6; }
  .tag-ativo button:hover { opacity:1; }

  /* ── RESULTS BAR ── */
  .results-bar {
    max-width:960px; margin:24px auto 14px; padding:0 20px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }
  .results-titulo { font-family:'Nunito',sans-serif; font-size:18px; font-weight:900; color:var(--cinza-escuro); }
  .results-count {
    background:var(--verde-bg); color:var(--verde);
    font-family:'Nunito',sans-serif; font-size:13px; font-weight:800;
    padding:5px 14px; border-radius:20px; border:1px solid rgba(30,107,53,.2);
  }

  /* ── GRID FEIRAS ── */
  .feiras-wrapper { max-width:960px; margin:0 auto; padding:0 20px 60px; }
  .feiras-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:16px; }

  .feira-card {
    background:#fff; border-radius:var(--radius); overflow:hidden;
    border:1px solid var(--cinza-claro); box-shadow:0 2px 10px rgba(0,0,0,.05);
    transition:transform .2s, box-shadow .2s; animation:slideUp .3s ease both;
  }
  .feira-card:hover { transform:translateY(-4px); box-shadow:0 12px 30px var(--sombra); }
  .feira-card-top {
    background:var(--verde); padding:16px 18px; cursor:pointer;
    position:relative; overflow:hidden;
  }
  .feira-card-top::after {
    content:''; position:absolute; right:-20px; top:-20px;
    width:100px; height:100px; border-radius:50%;
    background:rgba(255,255,255,.06);
  }
  .feira-top-row { display:flex; align-items:center; gap:12px; }
  .feira-icon {
    width:44px; height:44px; flex-shrink:0;
    background:var(--amarelo); border-radius:12px;
    display:flex; align-items:center; justify-content:center; font-size:22px;
  }
  .feira-nome { font-family:'Nunito',sans-serif; font-size:17px; font-weight:900; color:#fff; line-height:1.2; }
  .feira-bairro { font-size:12px; color:var(--amarelo); font-weight:700; margin-top:2px; }
  .feira-pills { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
  .feira-pill {
    font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px;
    background:rgba(255,255,255,.15); color:#fff;
  }
  .feira-pill.laranja { background:var(--laranja); }
  .feira-body { padding:14px 18px; }
  .feira-endereco { font-size:12px; color:var(--cinza-medio); margin-bottom:12px; display:flex; align-items:center; gap:5px; }
  .barracas-preview { display:flex; flex-direction:column; gap:5px; }
  .bp-item {
    display:flex; align-items:center; justify-content:space-between;
    background:var(--creme); border-radius:8px; padding:6px 10px;
    font-size:12px; gap:8px;
  }
  .bp-nome { font-weight:700; color:var(--cinza-escuro); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .bp-tipo { color:var(--cinza-medio); white-space:nowrap; flex-shrink:0; }
  .mais-barracas {
    font-size:12px; color:var(--verde-claro); font-weight:700;
    text-align:center; margin-top:8px; padding:6px;
    border:1px dashed rgba(30,107,53,.3); border-radius:8px;
  }
  .feira-footer { padding:0 18px 16px; }
  .btn-ver-barracas {
    width:100%; padding:10px; background:var(--laranja); color:#fff;
    border:none; border-radius:10px;
    font-family:'Nunito',sans-serif; font-size:13px; font-weight:800;
    cursor:pointer; transition:background .2s;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .btn-ver-barracas:hover { background:#d4621e; }

  /* ── PÁGINA DETALHE ── */
  .detalhe-wrapper { max-width:700px; margin:0 auto; padding:24px 20px 60px; }
  .btn-voltar {
    display:inline-flex; align-items:center; gap:6px;
    font-family:'Nunito',sans-serif; font-size:13px; font-weight:800;
    color:var(--verde); background:none; border:none; cursor:pointer; padding:0;
    margin-bottom:18px; transition:gap .15s;
  }
  .btn-voltar:hover { gap:10px; }

  .detalhe-header {
    background:var(--verde); border-radius:var(--radius);
    padding:24px; margin-bottom:20px; position:relative; overflow:hidden;
  }
  .detalhe-dots {
    position:absolute; right:-30px; top:-30px;
    width:180px; height:180px; opacity:.15;
    background-image: radial-gradient(circle, var(--amarelo) 3px, transparent 3px);
    background-size:18px 18px; border-radius:50%;
  }
  .detalhe-nome { font-family:'Nunito',sans-serif; font-size:clamp(22px,4vw,32px); font-weight:900; color:#fff; line-height:1.1; position:relative; }
  .detalhe-bairro { color:var(--amarelo); font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; margin-top:4px; position:relative; }
  .detalhe-pills { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; position:relative; }
  .detalhe-pill { font-size:12px; font-weight:700; padding:5px 12px; border-radius:20px; background:rgba(255,255,255,.18); color:#fff; }
  .detalhe-pill.laranja { background:var(--laranja); }
  .detalhe-endereco { font-size:12px; color:rgba(255,255,255,.75); margin-top:10px; position:relative; }

  .section-header { margin-bottom:14px; }
  .section-eyebrow { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:var(--laranja); }
  .section-title { font-family:'Nunito',sans-serif; font-size:20px; font-weight:900; color:var(--cinza-escuro); }

  .filtro-barraca-wrap { margin-bottom:14px; position:relative; }
  .filtro-barraca-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:16px; pointer-events:none; }
  .filtro-barraca-input {
    width:100%; padding:11px 16px 11px 40px;
    border:2px solid var(--cinza-claro); border-radius:12px;
    font-family:'Nunito Sans',sans-serif; font-size:14px; background:#fff;
    transition:border-color .2s,box-shadow .2s;
  }
  .filtro-barraca-input:focus { outline:none; border-color:var(--verde-claro); box-shadow:0 0 0 3px rgba(45,140,71,.1); }

  .barracas-list { display:flex; flex-direction:column; gap:10px; }
  .barraca-card {
    background:#fff; border-radius:14px; padding:14px 16px;
    border:1px solid var(--cinza-claro); box-shadow:0 2px 8px rgba(0,0,0,.04);
    display:flex; align-items:center; gap:12px;
    transition:box-shadow .2s; animation:slideUp .25s ease both;
  }
  .barraca-card:hover { box-shadow:0 6px 20px var(--sombra); }
  .barraca-avatar {
    width:50px; height:50px; border-radius:12px; flex-shrink:0;
    background:linear-gradient(135deg,var(--verde-bg),#b8e4c5);
    display:flex; align-items:center; justify-content:center; font-size:24px;
  }
  .barraca-info { flex:1; min-width:0; }
  .barraca-nome { font-family:'Nunito',sans-serif; font-size:15px; font-weight:800; color:var(--cinza-escuro); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .barraca-feirante { font-size:12px; color:var(--cinza-medio); margin-top:1px; }
  .barraca-tipo {
    display:inline-flex; font-size:11px; font-weight:700;
    padding:3px 9px; border-radius:20px; margin-top:4px;
    background:var(--verde-bg); color:var(--verde);
    border:1px solid rgba(30,107,53,.15);
  }
  .barraca-produtos { font-size:12px; color:var(--cinza-medio); margin-top:3px; line-height:1.4; }

  .btn-whatsapp {
    display:flex; align-items:center; gap:6px; flex-shrink:0;
    background:var(--whatsapp); color:#fff; border:none; border-radius:12px;
    padding:10px 13px; font-family:'Nunito',sans-serif; font-size:13px; font-weight:800;
    cursor:pointer; text-decoration:none; transition:background .2s, transform .15s;
    white-space:nowrap;
  }
  .btn-whatsapp:hover { background:var(--whatsapp-dark); transform:scale(1.04); }
  .btn-whatsapp svg { width:18px; height:18px; fill:#fff; flex-shrink:0; }
  .wlabel { display:inline; }

  /* ── EMPTY ── */
  .empty-state {
    text-align:center; padding:60px 20px;
    color:var(--cinza-medio); grid-column:1/-1;
  }
  .empty-icon { font-size:52px; opacity:.3; margin-bottom:12px; }
  .empty-title { font-family:'Nunito',sans-serif; font-size:20px; font-weight:900; color:var(--cinza-escuro); margin-bottom:6px; }
  .empty-barracas { text-align:center; padding:40px 20px; color:var(--cinza-medio); }

  .page { display:none; }
  .page.active { display:block; }

  @keyframes slideUp { from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)} }

  @media(max-width:600px) {
    .filtros-extras { grid-template-columns:1fr; }
    .feiras-grid { grid-template-columns:1fr; }
    .hero-mascot { width:110px; }
    .wlabel { display:none; }
    .btn-whatsapp { padding:10px 11px; }
  }
  @media(max-width:400px) {
    .hero-mascot { display:none; }
  }
</style>
</head>

<script>
let carrinho = [];
let total = 0;

// Função para adicionar ao carrinho
function adicionar(nomeProd, preco, banca) {
    carrinho.push({ nome: nomeProd, preco: preco, banca: banca });
    atualizarCarrinho();
}

function atualizarCarrinho() {
    const bar = document.getElementById('cart-bar');
    const count = document.getElementById('cart-count');
    const totalDisp = document.getElementById('cart-total');
    
    total = carrinho.reduce((acc, item) => acc + item.preco, 0);
    
    if (carrinho.length > 0) {
        bar.style.display = 'flex';
        count.innerText = `${carrinho.length} ${carrinho.length === 1 ? 'item' : 'itens'}`;
        totalDisp.innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
    } else {
        bar.style.display = 'none';
    }
}

// Adaptando a renderização das barracas para incluir botões de compra
function renderBarracas(lista) {
  const cont = document.getElementById('grid-barracas');
  cont.innerHTML = lista.map(b => `
    <div class="card-barraca">
      <div class="barraca-header">
        <span class="tag-tipo">${b.tipo}</span>
        <h4>${b.nome}</h4>
        <small>Feirante: ${b.feirante}</small>
      </div>
      <div style="padding: 15px;">
        <p style="font-size: 0.9rem; color: var(--cinza-medio);">Disponíveis hoje:</p>
        <div style="display: flex; flex-wrap: wrap;">
            ${b.produtos.split(',').map(p => `
                <button class="btn-add" onclick="adicionar('${p.trim()}', 10.00, '${b.nome}')">
                    + ${p.trim()} (R$ 10)
                </button>
            `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function abrirCheckout() {
    const resumo = document.getElementById('resumo-pedido');
    resumo.innerHTML = carrinho.map(i => `
        <div style="display:flex; justify-content:space-between; font-size:0.9rem; margin-bottom:5px;">
            <span>${i.nome} (${i.banca})</span>
            <span>R$ ${i.preco.toFixed(2)}</span>
        </div>
    `).join('');
    document.getElementById('modal-checkout').style.display = 'flex';
}

function fecharCheckout() {
    document.getElementById('modal-checkout').style.display = 'none';
}

function enviarPedido() {
    const nome = document.getElementById('cli-nome').value;
    const end = document.getElementById('cli-end').value;
    
    if(!nome || !end) return alert("Preencha nome e endereço!");

    let texto = `*Novo Pedido - Tem na Feira*%0A%0A`;
    texto += `*Cliente:* ${nome}%0A`;
    texto += `*Endereço:* ${end}%0A%0A`;
    texto += `*Itens:*%0A`;
    carrinho.forEach(i => texto += `- ${i.nome} (Banca: ${i.banca})%0A`);
    texto += `%0A*Total: R$ ${total.toFixed(2)}*`;

    // Simula envio para um número central de logística (Ex: seu número ou do entregador)
    window.open(`https://wa.me/5511999999999?text=${texto}`, '_blank');
    
    carrinho = [];
    atualizarCarrinho();
    fecharCheckout();
}

      </div>
      <a class="btn-whatsapp"
         href="https://wa.me/${b.whatsapp}?text=${encodeURIComponent('Olá ' + b.feirante + '! Vi sua barraca "' + b.nome + '" na ' + feiraAtual.nome + ' pelo Tem na Feira 🥬 Gostaria de mais informações!')}"
         target="_blank" rel="noopener">
        ${waSVG}<span class="wlabel">WhatsApp</span>
      </a>
    </div>`).join('');
}

function filtrarBarracas() {
  if (!feiraAtual) return;
  const q = document.getElementById('f-barraca').value.toLowerCase().trim();
  renderBarracas(feiraAtual.barracas.filter(b =>
    !q || b.nome.toLowerCase().includes(q) || b.produtos.toLowerCase().includes(q) ||
    b.tipo.toLowerCase().includes(q) || b.feirante.toLowerCase().includes(q)
  ));
}

function voltarInicio() {
  feiraAtual = null;
  document.getElementById('page-detalhe').classList.remove('active');
  document.getElementById('page-lista').classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderTags(nome, produto, turno) {
  const cont = document.getElementById('tags-ativos');
  const tags = [];
  if (nome)    tags.push({label:'Busca: '+nome,    clear:()=>{document.getElementById('f-nome').value='';filtrar();}});
  if (diaAtivo) tags.push({label:diaAtivo,          clear:()=>{diaAtivo='';document.querySelectorAll('.dia-btn').forEach(b=>b.classList.remove('active','hoje','amanha'));document.querySelector('.dia-btn[data-dia=""]').classList.add('active','hoje');filtrar();}});
  if (turno)   tags.push({label:turno.split(' ')[0], clear:()=>{document.getElementById('f-horario').value='';filtrar();}});
  if (produto) tags.push({label:'Produto: '+produto, clear:()=>{document.getElementById('f-produto').value='';filtrar();}});
  cont.innerHTML = tags.map((t,i) =>
    `<span class="tag-ativo">${t.label}<button onclick="clearTag(${i})">✕</button></span>`
  ).join('');
  window._tagClears = tags.map(t => t.clear);
}

function clearTag(i) { window._tagClears[i](); }
</script>
</body>
</html>
